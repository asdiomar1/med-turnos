name: CI Quality

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            **/*.csproj
            global.json
            NuGet.Config

      - name: Cache Sonar packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Install SonarScanner for .NET
        run: |
          dotnet tool update --global dotnet-sonarscanner
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Sonar begin
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
          SONAR_REGION: ${{ vars.SONAR_REGION }}
        run: |
          set -euo pipefail
          SONAR_HOST_URL="${SONAR_HOST_URL:-https://sonarcloud.io}"
          REGION_ARG=""
          if [ -n "${SONAR_REGION:-}" ]; then
            REGION_ARG="/d:sonar.region=${SONAR_REGION}"
          fi

          dotnet sonarscanner begin \
            /k:"${SONAR_PROJECT_KEY}" \
            /o:"${SONAR_ORGANIZATION}" \
            /d:sonar.host.url="${SONAR_HOST_URL}" \
            /d:sonar.token="${SONAR_TOKEN}" \
            /d:sonar.qualitygate.wait=true \
            /d:sonar.qualitygate.timeout=600 \
            /d:sonar.cs.vstest.reportsPaths="TestResults/**/*.trx" \
            /d:sonar.cs.opencover.reportsPaths="TestResults/**/coverage.opencover.xml" \
            ${REGION_ARG}

      - name: Restore
        run: dotnet restore MedicalCenter.sln

      - name: Build
        run: dotnet build MedicalCenter.sln --configuration Release --no-restore

      - name: Test with coverage
        run: >
          dotnet test MedicalCenter.sln
          --configuration Release
          --no-build
          --results-directory TestResults
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage;Format=opencover"

      - name: Sonar end
        if: ${{ always() }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

      - name: Upload test results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_id }}
          path: TestResults
          if-no-files-found: warn
