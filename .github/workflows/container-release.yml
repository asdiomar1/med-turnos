name: Container Release

on:
  workflow_run:
    workflows: ["CI Quality"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: container-release-${{ github.event.workflow_run.head_branch || github.ref_name || github.run_id }}
  cancel-in-progress: true

jobs:
  build_scan_publish:
    if: >
      ${{
        github.repository == 'asdiomar1/med-turnos' &&
        (
          github.event_name == 'workflow_dispatch' ||
          (
            github.event_name == 'workflow_run' &&
            github.event.workflow_run.conclusion == 'success' &&
            github.event.workflow_run.event == 'push' &&
            github.event.workflow_run.head_repository.full_name == github.repository
          )
        )
      }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      # NOTE: S7631 mitigation - workflow_run is guarded by github.repository check at job level (line 18).
      - name: Checkout source commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Compute image variables
        id: vars
        shell: bash
        env:
          SOURCE_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          SOURCE_BRANCH: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/medicalcenter-api
        run: |
          set -euo pipefail
          SHORT_SHA="${SOURCE_SHA:0:7}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "source_branch=${SOURCE_BRANCH}" >> "$GITHUB_OUTPUT"
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Compute publish tags
        id: tags
        shell: bash
        env:
          IMAGE_NAME: ${{ steps.vars.outputs.image_name }}
          SHORT_SHA: ${{ steps.vars.outputs.short_sha }}
          SOURCE_BRANCH: ${{ steps.vars.outputs.source_branch }}
        run: |
          set -euo pipefail
          {
            echo "all<<EOF"
            echo "${IMAGE_NAME}:sha-${SHORT_SHA}"
            if [ "${SOURCE_BRANCH}" = "main" ]; then
              echo "${IMAGE_NAME}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build candidate image (local)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          file: src/MedicalCenter.Api/Dockerfile
          push: false
          load: true
          tags: ${{ steps.vars.outputs.image_name }}:sha-${{ steps.vars.outputs.short_sha }}
          cache-from: type=gha,scope=medicalcenter-api
          cache-to: type=gha,mode=max,scope=medicalcenter-api

      - name: Trivy scan (block HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # 0.35.0
        with:
          scan-type: image
          image-ref: ${{ steps.vars.outputs.image_name }}:sha-${{ steps.vars.outputs.short_sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          hide-progress: true

      - name: Upload Trivy SARIF
        if: ${{ always() }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Build and push release image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          file: src/MedicalCenter.Api/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.all }}
          cache-from: type=gha,scope=medicalcenter-api
          cache-to: type=gha,mode=max,scope=medicalcenter-api
